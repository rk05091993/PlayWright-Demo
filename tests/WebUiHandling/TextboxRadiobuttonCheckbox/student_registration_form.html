<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Long Student Registration Page</title>
<style>
body{font-family:Arial;background:#eef2f7;margin:0}
header{background:#007bff;color:white;padding:18px;text-align:center;font-size:22px}
section{background:white;margin:25px auto;padding:25px;border-radius:10px;width:700px;box-shadow:0 8px 18px rgba(0,0,0,.15)}
h2{border-bottom:2px solid #ddd;padding-bottom:6px}
label{display:block;margin-top:12px;font-weight:bold}
input,select,textarea{width:100%;padding:8px;margin-top:5px;border-radius:5px;border:1px solid #ccc}
.inline{display:flex;gap:15px;margin-top:5px}
.checkbox-group label{font-weight:normal}
button{margin-top:20px;padding:12px;background:#28a745;border:none;color:white;font-size:16px;border-radius:6px;cursor:pointer}
button:hover{background:#1e7e34}
footer{background:#222;color:white;text-align:center;padding:18px;margin-top:40px}
label:has(+ input[required])::after,
label:has(+ textarea[required])::after,
label:has(+ select[required])::after{content:" *";color:red;font-weight:bold}
</style>
</head>
<body>
<header>University Student Admission Portal</header>

<form>
<section>
<h2>Personal Details</h2>
<label>Full Name</label>
<input type="text" name="name" required>
<label>Email</label>
<input type="email" name="email" required>
<label>Mobile</label>
<input type="text" name="mobile" pattern="[0-9]{10}" required>
<label>Gender</label>
<div class="inline">
<label><input type="radio" name="gender" required> Male</label>
<label><input type="radio" name="gender"> Female</label>
<label><input type="radio" name="gender"> Other</label>
</div>
<label>Date of Birth</label>
<input type="date" required>
</section>

<section>
<h2>Address Details</h2>
<label>Address Line 1</label>
<input type="text" required>
<label>Address Line 2</label>
<input type="text" required>
<label>City</label>
<input type="text" required>
<label>State</label>
<input type="text" required>
<label>Country</label>
<input type="text" required>
<label>Pincode</label>
<input type="text" pattern="[0-9]{6}" required>
</section>

<section>
<h2>Education Details</h2>
<label>10th Percentage</label>
<input type="number" min="0" max="100" required>
<label>12th Percentage</label>
<input type="number" min="0" max="100" required>
<label>Graduation CGPA</label>
<input type="number" step="0.01" min="0" max="10" required>
<label>University Name</label>
<input type="text" required>
<label>Year of Passing</label>
<input type="number" min="1990" max="2099" required>
</section>

<section>
<h2>Course Selection</h2>
<div class="checkbox-group">
<label><input type="checkbox" name="course" value="java" required> Java</label>
<label><input type="checkbox" name="course" value="selenium"> Selenium</label>
<label><input type="checkbox" name="course" value="playwright"> Playwright</label>
<label><input type="checkbox" name="course" value="devops"> DevOps</label>
<label><input type="checkbox" name="course" value="aws"> AWS</label>
<label><input type="checkbox" name="course" value="ds"> Data Structures</label>
<label><input type="checkbox" name="course" value="sd"> System Design</label>
</div>
</section>

<section>
<h2>Additional Information</h2>
<label>Why do you want this course?</label>
<textarea rows="4" required></textarea>
<label>Preferred Batch</label>
<select required>
<option value="">Select</option>
<option>Morning</option>
<option>Afternoon</option>
<option>Evening</option>
</select>
<label>Mode</label>
<div class="inline">
<label><input type="radio" name="mode" required> Online</label>
<label><input type="radio" name="mode"> Offline</label>
</div>
</section>

<section>
<h2>Declaration</h2>
<label><input type="checkbox" required> I confirm all details are correct</label>
<button type="submit">Submit Application</button>
</section>

</form>

<footer>© 2026 Student Admission Portal</footer>
</body>
</html>
